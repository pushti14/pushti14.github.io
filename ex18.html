<!DOCTYPE html>
<html>
<head>
<title>Headings Layout</title>

<style>
body{
    background:#eeeeee;
    font-family:"Times New Roman", serif;
}

.container{
    background:white;
    width:750px;
    padding:20px;
    margin:40px auto;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
}

/* Heading 1 */
.heading1{
    font-size:42px;
    font-weight:bold;
    border-top:5px solid black;   /* only top border */
    display:inline-block;
    padding-top:5px;
    margin-bottom:20px;
    text-shadow: 3px 3px pink;    /* pink shadow */
}

/* Heading 2 */
.heading2{
    font-size:30px;
    font-style:italic;
    font-weight:bold;             /* slightly bold */
    border:3px solid black;
    outline:6px solid yellow;
    padding:5px 10px;
    margin-bottom:25px;
}

/* Heading 3 */
.heading3{
    font-size:22px;
    text-decoration:underline;
    text-align:right;
    font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<div class="heading1">This is heading 1</div>

<div class="heading2">This is heading 2</div>

<div class="heading3">This is heading 3</div>

</div>

</body>
</html>
