<!DOCTYPE html>
<html>
<head>
<title>Hello World Boxes</title>

<style>
body{
    background-color: #f0f0f0;
    font-family: "Times New Roman", serif;
}

/* first box */
.box1{
    background-color: #9fbec7;
    border: 5px double red;
    padding: 10px;
    margin: 20px;
    font-size: 40px;
    font-weight: bold;
}

/* second box */
.box2{
    background-color: yellow;
    border: 3px solid #1e90ff;
    border-radius: 12px;
    padding: 10px;
    margin: 20px;
    font-size: 40px;
    font-weight: bold;
}

/* third box */
.box3{
    background-color: #2e8b57;
    border: 8px dotted #888;
    padding: 10px;
    margin: 20px;
    font-size: 40px;
    font-weight: bold;
    color: black;
}
</style>

</head>

<body>

<div class="box1">Hello World</div>

<div class="box2">Hello World</div>

<div class="box3">Hello World</div>

</body>
</html>
