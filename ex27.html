<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Layout</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #4ab8e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      background: white;
      border-radius: 10px;
      padding: 16px;
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── GREEN BANNER ── */
    .green {
      background: #8dc63f;
      border-radius: 6px;
      height: 110px;
    }

    /* ── TEAL SECTION ──
       Layout B (≥480px): 3 equal vertical columns, same height */
    .teal-section {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      height: 150px;
    }
    .teal-section .t {
      background: #00bcd4;
      border-radius: 6px;
    }

    /* ── GREY SECTION ──
       Layout B (≥480px): 3 equal boxes in a row */
    .grey-section {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .grey-section .g {
      background: #cfd8dc;
      border-radius: 6px;
      height: 55px;
    }

    /* ══════════════════════════════
       LAYOUT A  —  width < 480px
    ══════════════════════════════ */
    @media (max-width: 479px) {

      /* Teal: 4 full-width stacked rows */
      .teal-section {
        grid-template-columns: 1fr;
        height: auto;
        gap: 8px;
      }
      .teal-section .t {
        height: 40px;
      }
      /* show 4th teal row on mobile */
      .teal-section .t4 { display: block; }

      /* Grey: 2 columns × 2 rows (4 boxes) */
      .grey-section {
        grid-template-columns: repeat(2, 1fr);
      }
      /* show 4th grey box on mobile */
      .grey-section .g4 { display: block; }
    }

    /* hide the extra mobile-only cells on desktop */
    @media (min-width: 480px) {
      .teal-section .t4 { display: none; }
      .grey-section .g4 { display: none; }
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- Green banner -->
    <div class="green"></div>

    <!-- Teal section -->
    <div class="teal-section">
      <div class="t"></div>
      <div class="t"></div>
      <div class="t"></div>
      <div class="t t4"></div><!-- 4th row, mobile only -->
    </div>

    <!-- Grey section -->
    <div class="grey-section">
      <div class="g"></div>
      <div class="g"></div>
      <div class="g"></div>
      <div class="g g4"></div><!-- 4th box, mobile only -->
    </div>

  </div>
</body>
</html>
