<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Layout</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #4ab8e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 10px;
      padding: 14px;
      width: 100%;
      max-width: 660px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* === GREEN BANNER === */
    .green {
      background: #8dc63f;
      border-radius: 6px;
      height: 100px;
      width: 100%;
    }

    /* === TEAL SECTION (Layout B) ===
       Left tall column + two smaller top-right + one wide bottom-right */
    .teal-section {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: 90px 60px;
      gap: 8px;
    }
    .teal-section .t1 {
      background: #00bcd4;
      border-radius: 6px;
      grid-column: 1;
      grid-row: 1 / 3;
    }
    .teal-section .t2 {
      background: #00bcd4;
      border-radius: 6px;
      grid-column: 2;
      grid-row: 1;
    }
    .teal-section .t3 {
      background: #00bcd4;
      border-radius: 6px;
      grid-column: 3;
      grid-row: 1;
    }
    .teal-section .t4 {
      background: #00bcd4;
      border-radius: 6px;
      grid-column: 2 / 4;
      grid-row: 2;
    }

    /* === GREY SECTION (Layout B): 4 equal columns === */
    .grey-section {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .grey-section .g {
      background: #cfd8dc;
      border-radius: 6px;
      height: 50px;
    }

    /* ============================= */
    /* === LAYOUT A  (< 480px)  === */
    /* ============================= */
    @media (max-width: 479px) {

      /* Teal: 4 full-width stacked rows */
      .teal-section {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .teal-section .t1,
      .teal-section .t2,
      .teal-section .t3,
      .teal-section .t4 {
        height: 40px;
        grid-column: unset;
        grid-row: unset;
      }

      /* Grey: 2 columns × 2 rows */
      .grey-section {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- Green banner -->
    <div class="green"></div>

    <!-- Teal section -->
    <div class="teal-section">
      <div class="t1"></div>
      <div class="t2"></div>
      <div class="t3"></div>
      <div class="t4"></div>
    </div>

    <!-- Grey section -->
    <div class="grey-section">
      <div class="g"></div>
      <div class="g"></div>
      <div class="g"></div>
      <div class="g"></div>
    </div>

  </div>
</body>
</html>
