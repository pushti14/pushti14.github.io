<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Layout</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
    }

    body {
      background-color: #55b7f0;
      padding: 35px 25px;
      font-family: Arial, sans-serif;
    }

    .wrapper {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      background-color: white;
      border-radius: 12px;
      padding: 16px;
    }

    .header {
      width: 100%;
      height: 150px;
      background-color: #b4df3e;
      margin-bottom: 10px;
    }

    .main {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 10px;
    }

    .main div {
      height: 165px;
      background-color: #12bdc7;
    }

    .footer {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .footer div {
      height: 90px;
      background-color: #e8f0f2;
    }

    /* Mobile view: less than 480px */
    @media screen and (max-width: 480px) {
      body {
        padding: 55px 28px;
      }

      .wrapper {
        max-width: 100%;
        padding: 14px;
        border-radius: 10px;
      }

      .header {
        height: 125px;
        margin-bottom: 8px;
      }

      .main {
        display: grid;
        grid-template-columns: 1fr;
        gap: 6px;
        margin-bottom: 8px;
      }

      .main div {
        width: 100%;
        height: 70px;
        display: block;
      }

      .footer {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 6px;
      }

      .footer div {
        height: 48px;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header"></div>

    <div class="main">
      <div></div>
      <div></div>
      <div></div>
    </div>

    <div class="footer">
      <div></div>
      <div></div>
      <div></div>
      <div></div>
    </div>
  </div>
</body>
</html>
