<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Responsive Layout Exercise</title>
  <style>

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #5bc8e8;   /* light blue outer background */
      padding: 20px;
      font-family: Arial, sans-serif;
      min-height: 100vh;
    }

    /* ── White card container ── */
    .container {
      background: #ffffff;
      padding: 12px;
      border-radius: 4px;
      max-width: 900px;
      margin: 0 auto;
    }

    /* ══════════════════════════════════════
       COLOUR BLOCKS
    ══════════════════════════════════════ */
    .green  { background: #8dc63f; }   /* lime green */
    .teal   { background: #29abe2; }   /* teal / cyan */
    .grey   { background: #d1d3d4; }   /* light grey */

    /* ══════════════════════════════════════
       MOBILE LAYOUT  (default — below 480px)
       Single column, everything stacks
    ══════════════════════════════════════ */

    /* Green banner — full width */
    .green-banner {
      width: 100%;
      height: 80px;
      margin-bottom: 8px;
      border-radius: 3px;
    }

    /* Teal rows — 4 full-width stacked rows */
    .teal-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 8px;
    }

    .teal-grid .teal {
      width: 100%;
      height: 36px;
      border-radius: 3px;
    }

    /* Grey boxes — 3 small boxes in a row */
    .grey-row {
      display: flex;
      flex-direction: row;
      gap: 8px;
    }

    .grey-row .grey {
      flex: 1;
      height: 36px;
      border-radius: 3px;
    }

    /* ══════════════════════════════════════
       DESKTOP LAYOUT  (480px and above)
       Grid: green full width top,
             teal in 2x2 grid,
             grey in a row below
    ══════════════════════════════════════ */
    @media only screen and (min-width: 480px) {

      /* Green banner stays full width */
      .green-banner {
        height: 100px;
        margin-bottom: 10px;
      }

      /* Teal grid becomes 2 columns, 2 rows */
      .teal-grid {
        flex-direction: row;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 10px;
      }

      .teal-grid .teal {
        /* each teal box takes up roughly half the width minus the gap */
        width: calc(50% - 5px);
        height: 80px;
        flex: none;
      }

      /* Grey row stays as a row — boxes get a bit taller */
      .grey-row {
        gap: 10px;
      }

      .grey-row .grey {
        height: 50px;
      }

    }

  </style>
</head>
<body>

  <div class="container">

    <!-- Green top banner -->
    <div class="green-banner green"></div>

    <!-- Teal blocks:
         Mobile  → 4 stacked full-width rows
         Desktop → 2x2 grid -->
    <div class="teal-grid">
      <div class="teal"></div>
      <div class="teal"></div>
      <div class="teal"></div>
      <div class="teal"></div>
    </div>

    <!-- Grey small boxes — always a row -->
    <div class="grey-row">
      <div class="grey"></div>
      <div class="grey"></div>
      <div class="grey"></div>
    </div>

  </div>

</body>
</html>
